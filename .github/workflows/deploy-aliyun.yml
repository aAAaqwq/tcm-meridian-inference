name: Build and Deploy to Aliyun

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: crpi-lwz264sedmauvivo.cn-guangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: danielli/tcm-meridian-inference

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            set -e
            echo "=== TCM API Deployment Start ==="

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            CONTAINER_NAME="tcm-api"
            PORT="18790"

            echo "Image: $IMAGE"

            # 登录阿里云容器镜像服务
            echo "Logging into Aliyun ACR..."
            echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.ALIYUN_USERNAME }} --password-stdin

            # 拉取最新镜像
            echo "Pulling image: $IMAGE"
            docker pull $IMAGE

            # 停止并删除旧容器
            echo "Stopping old container..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true

            # 启动新容器
            echo "Starting new container..."
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p $PORT:$PORT \
              -e TCM_API_PORT=$PORT \
              -e TCM_INFER_MODE="${{ secrets.TCM_INFER_MODE || 'auto' }}" \
              -e TCM_LOG_LEVEL="${{ secrets.TCM_LOG_LEVEL || 'INFO' }}" \
              -e DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
              -e DEEPSEEK_MODEL="${{ secrets.DEEPSEEK_MODEL || 'deepseek-chat' }}" \
              $IMAGE

            # 等待服务启动
            echo "Waiting for service..."
            sleep 5

            # 健康检查
            if curl -s http://localhost:$PORT/health | grep -q '"status": "ok"'; then
              echo "✅ Health check passed"
              curl -s http://localhost:$PORT/health
            else
              echo "⚠️ Health check failed"
              docker logs $CONTAINER_NAME --tail 20
              exit 1
            fi

            echo "=== Deployment Completed ==="
            echo "API URL: http://${{ secrets.SSH_HOST }}:$PORT"
