version: '3.8'

services:
  tcm-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tcm-meridian-inference:latest
    container_name: tcm-api
    restart: unless-stopped

    # Resource limits - 增加内存限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    # 系统限制优化
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 32768
        hard: 32768

    # Environment variables
    environment:
      - TCM_API_PORT=18790
      - TCM_INFER_MODE=${TCM_INFER_MODE:-auto}
      - TCM_LOG_LEVEL=${TCM_LOG_LEVEL:-INFO}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      # Python 内存优化
      - PYTHONUNBUFFERED=1
      - MALLOC_ARENA_MAX=2
      - MALLOC_MMAP_THRESHOLD_=131072
      - MALLOC_TRIM_THRESHOLD_=131072
      - MALLOC_TOP_PAD_=131072

    # Port mapping - 统一使用 18790 端口
    ports:
      - "18790:18790"

    # Health check - 缩短检查间隔，更快发现问题
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18790/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service_name,environment"
        env: "TCM_INFER_MODE,TCM_LOG_LEVEL"

    # Security options
    security_opt:
      - no-new-privileges:true

    networks:
      - tcm-network

  # Optional: Nginx reverse proxy (recommended for production)
  nginx:
    image: nginx:alpine
    container_name: tcm-nginx
    restart: unless-stopped
    depends_on:
      tcm-api:
        condition: service_healthy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./logs/nginx:/var/log/nginx

    networks:
      - tcm-network

    # Only start nginx if you have nginx config ready
    profiles:
      - with-nginx

networks:
  tcm-network:
    driver: bridge
